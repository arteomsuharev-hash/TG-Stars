<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GiftCase">
<title>GIFTCASE — Premium Cases</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#060606;color:#fff;font-family:'DM Sans',sans-serif;height:100vh;overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh}
.topbar{height:52px;background:#0f0f0f;border-bottom:1px solid #252525;display:flex;align-items:center;justify-content:space-between;padding:0 14px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:24px;color:#fff}
.balance-pill{background:#161616;border:1px solid #252525;border-radius:999px;padding:5px 11px;display:flex;align-items:center;gap:5px;cursor:pointer}
.bal-val{font-weight:700;color:#fff}
.content{flex:1;overflow-y:auto;padding:14px}
.panel{display:none}
.panel.active{display:block}
.tabs{position:fixed;bottom:0;left:0;right:0;height:58px;background:#0f0f0f;border-top:1px solid #252525;display:flex}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:#505050;background:none;border:none}
.tab.active{color:#c8a96e}
.cases-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.case-card{background:#0f0f0f;border:1px solid #252525;border-radius:20px;overflow:hidden}
.case-visual{height:88px;display:flex;align-items:center;justify-content:center}
.case-emoji{font-size:40px}
.case-body{padding:8px}
.case-name{font-family:'Bebas Neue',sans-serif;font-size:13px;color:#fff}
.case-price{font-size:10px;color:#c8a96e}
.open-btn{width:100%;padding:7px;background:#1e1e1e;border:1px solid #323232;border-radius:999px;color:#fff;font-size:10px;cursor:pointer}
.inv-section{background:#0f0f0f;border:1px solid #252525;border-radius:20px;padding:14px;margin-top:14px}
.inv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:6px}
.inv-card{background:#161616;border:1px solid #252525;border-radius:14px;padding:8px;text-align:center;cursor:pointer}
.inv-icon{font-size:22px}
.inv-name{font-size:9px;color:#909090}
.inv-val{font-size:10px;color:#c8a96e}
.btn{width:100%;padding:13px;border-radius:999px;font-size:13px;font-weight:700;text-transform:uppercase;cursor:pointer}
.btn-primary{background:#fff;color:#000}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:600;display:none;align-items:flex-end;justify-content:center}
.modal-ov.show{display:flex}
.modal-sheet{background:#0f0f0f;border:1px solid #252525;border-radius:28px 28px 0 0;padding:24px 16px;width:100%;max-width:540px}
.modal-handle{width:40px;height:4px;background:#323232;border-radius:2px;margin:0 auto 16px}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:24px;margin-bottom:14px}
.deposit-amounts{display:flex;gap:7px;flex-wrap:wrap;margin:10px 0}
.dep-amt{flex:1;min-width:60px;padding:8px;background:#161616;border:2px solid #252525;border-radius:14px;text-align:center;cursor:pointer}
.dep-amt.selected{border-color:#c8a96e}
.dep-amt-stars{font-family:'Bebas Neue',sans-serif;font-size:18px;color:#c8a96e}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#161616;border:1px solid #323232;border-radius:999px;padding:9px 18px;font-size:12px;z-index:999;animation:toastIn .3s ease}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(14px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>
</head>
<body>
<div class="modal-ov" id="depositModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">💎 ПОПОЛНИТЬ</div>
    <p style="font-size:12px;color:#505050;margin-bottom:14px">Оплата через Telegram Stars</p>
    <div class="deposit-amounts" id="depAmounts"></div>
    <button class="btn btn-primary" id="depConfirmBtn" disabled>ОПЛАТИТЬ</button>
    <button class="btn btn-outline" id="depCancelBtn" style="margin-top:8px">Отмена</button>
  </div>
</div>

<div class="app" id="app">
  <div class="topbar">
    <div class="logo">GIFTCASE</div>
    <div class="topbar-right">
      <div class="balance-pill" id="balancePill">
        <span>★</span>
        <span class="bal-val" id="balVal">250</span>
      </div>
      <button class="add-btn" id="addBtn" style="background:#1e1e1e;border:1px solid #323232;border-radius:999px;padding:5px 10px;font-size:11px">+100 ★</button>
    </div>
  </div>

  <div class="content" id="mainContent">
    <div class="panel active" id="casesPanel">
      <div class="cases-grid" id="casesGrid"></div>
      <div class="inv-section"><h3>МОИ ПОДАРКИ</h3><div class="inv-grid" id="invCases"></div></div>
    </div>
    <div class="panel" id="profilePanel">
      <div class="inv-section"><h3>МОИ ПОДАРКИ</h3><div class="inv-grid" id="invProfile"></div></div>
      <div class="inv-section"><h3>ИСТОРИЯ</h3><div id="histBody"></div></div>
    </div>
  </div>

  <div class="tabs" id="tabsBar">
    <button class="tab active" data-tab="cases">🎁 Кейсы</button>
    <button class="tab" data-tab="profile">👤 Профиль</button>
  </div>
</div>

<script>
var userId = 'test_user';
var state = { balance: 250, inventory: [], history: [] };
var selectedDepAmt = null;

var DEP_AMTS = [
  {stars:50, price:1}, {stars:150, price:2}, {stars:500, price:5},
  {stars:1000, price:10}, {stars:2500, price:25}, {stars:5000, price:50}
];

var CASES = [
  {id:"starter", name:"СТАРТОВЫЙ", emoji:"🎀", price:12, gifts:[{n:"Конфеты"},{n:"Открытка"},{n:"Кексик"}]},
  {id:"common", name:"ОБЫЧНЫЙ", emoji:"📦", price:25, gifts:[{n:"Мишка"},{n:"Цветы"},{n:"Шоколад"}]}
];

var GIFTS = {
  "Конфеты": {icon:"🍬", val:8}, "Открытка": {icon:"💌", val:10}, "Кексик": {icon:"🧁", val:10},
  "Мишка": {icon:"🧸", val:15}, "Цветы": {icon:"💐", val:15}, "Шоколад": {icon:"🍫", val:15}
};

function toast(msg) {
  var t = document.createElement('div');
  t.className = 'toast';
  t.innerText = msg;
  document.body.appendChild(t);
  setTimeout(function() { t.remove(); }, 2600);
}

function setBal(v) {
  state.balance = Math.max(0, Math.floor(v));
  document.getElementById('balVal').innerText = state.balance;
}

function addHist(icon, action, result, pos) {
  state.history.unshift({icon: icon, action: action, result: result, pos: pos});
}

function saveUser() { localStorage.setItem('gc_test', JSON.stringify(state)); }

function loadUser() {
  var saved = localStorage.getItem('gc_test');
  if(saved) { var d = JSON.parse(saved); state.balance = d.balance; state.inventory = d.inventory || []; state.history = d.history || []; }
  updateUI();
}

function updateUI() {
  document.getElementById('balVal').innerText = state.balance;
  renderInv('invCases');
  renderInv('invProfile', true);
  renderHist();
}

function renderInv(cid, withSell) {
  var el = document.getElementById(cid);
  if(!el) return;
  if(!state.inventory.length) { el.innerHTML = '<div class="inv-empty">📭 Нет подарков</div>'; return; }
  var html = '';
  for(var i = 0; i < state.inventory.length; i++) {
    var g = state.inventory[i];
    html += '<div class="inv-card" data-idx="' + i + '"><div class="inv-icon">' + g.icon + '</div><div class="inv-name">' + g.name + '</div><div class="inv-val">★ ' + g.val + '</div>';
    if(withSell) html += '<button class="sell-chip" data-idx="' + i + '">Продать</button>';
    html += '</div>';
  }
  el.innerHTML = html;
  if(withSell) {
    var btns = el.querySelectorAll('.sell-chip');
    for(var j = 0; j < btns.length; j++) {
      btns[j].onclick = function(e) { e.stopPropagation(); sellGift(parseInt(this.dataset.idx)); };
    }
  }
}

function sellGift(i) {
  var g = state.inventory[i];
  if(!g) return;
  var p = Math.floor(g.val * 0.7);
  state.inventory.splice(i,1);
  setBal(state.balance + p);
  addHist(g.icon, 'Продан: '+g.name, '+'+p+' ★', true);
  updateUI();
  toast('💰 '+p+' ★');
}

function renderHist() {
  var el = document.getElementById('histBody');
  if(!el) return;
  if(!state.history.length) { el.innerHTML = '<div style="color:#505050;text-align:center;padding:14px">Нет истории</div>'; return; }
  var html = '';
  for(var i = 0; i < Math.min(state.history.length, 25); i++) {
    var h = state.history[i];
    html += '<div style="padding:7px 0;border-bottom:1px solid #252525">' + h.icon + ' ' + h.action + ' <span style="color:' + (h.pos ? '#4ade80' : '#f87171') + '">' + h.result + '</span></div>';
  }
  el.innerHTML = html;
}

function renderCases() {
  var g = document.getElementById('casesGrid');
  if(!g) return;
  var html = '';
  for(var i = 0; i < CASES.length; i++) {
    var c = CASES[i];
    html += '<div class="case-card"><div class="case-visual"><div class="case-emoji">' + c.emoji + '</div></div><div class="case-body"><div class="case-name">' + c.name + '</div><div class="case-price">★ ' + c.price + '</div><button class="open-btn" data-id="' + c.id + '">ОТКРЫТЬ</button></div></div>';
  }
  g.innerHTML = html;
  var btns = g.querySelectorAll('.open-btn');
  for(var j = 0; j < btns.length; j++) {
    btns[j].onclick = function() { var id = this.dataset.id; for(var k = 0; k < CASES.length; k++) { if(CASES[k].id === id) openCase(CASES[k]); } };
  }
}

function rollCase(gifts) {
  return gifts[Math.floor(Math.random() * gifts.length)].n;
}

function openCase(c) {
  if(state.balance < c.price) { toast('❌ Нужно '+c.price+' ★'); return; }
  setBal(state.balance - c.price);
  var won = rollCase(c.gifts);
  var info = GIFTS[won] || {icon:'🎁', val:10};
  state.inventory.push({name: won, icon: info.icon, val: info.val});
  addHist(info.icon, 'Кейс: '+c.name, '+'+won, true);
  toast('📦 '+won);
  updateUI();
}

function openDepositModal() {
  var el = document.getElementById('depAmounts');
  if(!el) return;
  selectedDepAmt = null;
  document.getElementById('depConfirmBtn').disabled = true;
  var html = '';
  for(var i = 0; i < DEP_AMTS.length; i++) {
    var d = DEP_AMTS[i];
    html += '<div class="dep-amt" data-i="' + i + '"><div class="dep-amt-stars">★ ' + d.stars + '</div><div class="dep-amt-price">' + d.price + ' XTR</div></div>';
  }
  el.innerHTML = html;
  var items = el.querySelectorAll('.dep-amt');
  for(var j = 0; j < items.length; j++) {
    items[j].onclick = function() {
      var parent = this.parentNode;
      var all = parent.querySelectorAll('.dep-amt');
      for(var k = 0; k < all.length; k++) all[k].classList.remove('selected');
      this.classList.add('selected');
      selectedDepAmt = DEP_AMTS[parseInt(this.dataset.i)];
      document.getElementById('depConfirmBtn').disabled = false;
    };
  }
  document.getElementById('depositModal').classList.add('show');
}

document.getElementById('depCancelBtn').onclick = function() {
  document.getElementById('depositModal').classList.remove('show');
};

// ГЛАВНЫЙ ОБРАБОТЧИК ОПЛАТЫ - ИСПРАВЛЕН
document.getElementById('depConfirmBtn').onclick = function() {
  if (!selectedDepAmt) return;
  
  var tg = window.Telegram?.WebApp;
  
  if (tg && tg.openInvoice) {
    tg.openInvoice({
      title: 'GiftCase Stars',
      description: 'Пополнение баланса',
      payload: 'test_payload_' + Date.now(),
      provider_token: '',
      currency: 'XTR',
      prices: [{ label: selectedDepAmt.stars + ' Stars', amount: selectedDepAmt.price }]
    });
    
    tg.onEvent('invoice_closed', function(data) {
      if (data.status === 'paid') {
        setBal(state.balance + selectedDepAmt.stars);
        addHist('💎', 'Пополнение (Stars)', '+' + selectedDepAmt.stars + ' ★', true);
        toast('✅ Баланс пополнен на ' + selectedDepAmt.stars + ' ★');
        document.getElementById('depositModal').classList.remove('show');
        saveUser();
      } else if (data.status === 'cancelled') {
        toast('❌ Оплата отменена');
      } else {
        toast('❌ Ошибка оплаты');
      }
    });
  } else {
    setBal(state.balance + selectedDepAmt.stars);
    addHist('💎', 'Пополнение (демо)', '+' + selectedDepAmt.stars + ' ★', true);
    toast('✅ Баланс пополнен на ' + selectedDepAmt.stars + ' ★ (демо)');
    document.getElementById('depositModal').classList.remove('show');
    saveUser();
  }
};

document.getElementById('addBtn').onclick = function() {
  setBal(state.balance + 100);
  addHist('⭐️', 'Пополнение', '+100 ★', true);
  toast('★ +100');
  saveUser();
};

document.getElementById('balancePill').onclick = function() {
  setBal(state.balance + 100);
  addHist('⭐️', 'Пополнение', '+100 ★', true);
  toast('★ +100');
  saveUser();
};

var tabs = document.querySelectorAll('.tab');
for(var i = 0; i < tabs.length; i++) {
  tabs[i].onclick = function() {
    for(var j = 0; j < tabs.length; j++) tabs[j].classList.remove('active');
    this.classList.add('active');
    var panels = document.querySelectorAll('.panel');
    for(var k = 0; k < panels.length; k++) panels[k].classList.remove('active');
    var tab = this.dataset.tab;
    document.getElementById(tab + 'Panel').classList.add('active');
    if(tab === 'profile') updateUI();
  };
}

renderCases();
loadUser();
updateUI();
</script>
</body>
</html>
