<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GiftCase — PvP Батлы с Telegram Gift</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: radial-gradient(circle at 20% 50%, #0a0f1e, #05070f);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 16px;
            min-height: 100vh;
            color: white;
        }

        .app {
            max-width: 500px;
            margin: 0 auto;
        }

        /* Шапка с балансом */
        .header {
            background: rgba(10, 20, 40, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 12px 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(0, 255, 255, 0.3);
            box-shadow: 0 4px 15px rgba(0, 255, 255, 0.1);
        }

        .balance {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.5);
            padding: 6px 16px;
            border-radius: 40px;
        }

        .balance span:first-child {
            font-size: 14px;
            opacity: 0.7;
        }

        .balance span:last-child {
            font-size: 22px;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 0 0 5px #FFD700;
        }

        .add-stars {
            background: linear-gradient(135deg, #2a6df4, #1a4ad4);
            border: none;
            color: white;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 8px rgba(42, 109, 244, 0.4);
        }

        .add-stars:active {
            transform: scale(0.96);
        }

        /* Вкладки */
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: none;
            padding: 12px;
            border-radius: 28px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 16px;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #f09819, #ff6a00);
            box-shadow: 0 4px 15px rgba(240, 152, 25, 0.4);
        }

        /* Панели */
        .panel {
            display: none;
        }

        .panel.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Сетка кейсов */
        .cases-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .case-card {
            background: linear-gradient(135deg, rgba(20, 30, 55, 0.9), rgba(15, 20, 40, 0.9));
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 16px;
            border: 1px solid rgba(0, 255, 255, 0.2);
            transition: all 0.2s;
            cursor: pointer;
        }

        .case-card:active {
            transform: scale(0.98);
        }

        .case-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .case-name {
            font-size: 20px;
            font-weight: bold;
        }

        .case-price {
            background: #FFD70020;
            padding: 4px 14px;
            border-radius: 40px;
            color: #FFD700;
            font-weight: bold;
        }

        .case-chance {
            font-size: 12px;
            opacity: 0.6;
            margin-bottom: 8px;
        }

        .gift-preview {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        .gift-tag {
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
        }

        .open-btn {
            background: linear-gradient(90deg, #f09819, #ff6a00);
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 16px;
            color: white;
            width: 100%;
            margin-top: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .open-btn:active {
            transform: scale(0.97);
        }

        /* Анимация открытия */
        .opening-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.2s;
        }

        .case-opening {
            text-align: center;
            transform: scale(0);
            animation: pop 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
        }

        @keyframes pop {
            0% { transform: scale(0) rotate(-180deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        .case-opening .gift-box {
            font-size: 100px;
            animation: shake 0.3s infinite;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #FFD700;
            animation: fall 1s linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        /* PvP секция */
        .pvp-create {
            background: linear-gradient(135deg, rgba(30, 20, 50, 0.9), rgba(20, 15, 40, 0.9));
            border-radius: 28px;
            padding: 20px;
            border: 1px solid rgba(255, 0, 128, 0.3);
            margin-bottom: 20px;
        }

        .pvp-create select, .pvp-create button {
            width: 100%;
            padding: 14px;
            margin-top: 12px;
            border-radius: 40px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 16px;
        }

        .pvp-create button {
            background: linear-gradient(135deg, #ff0080, #ff6a00);
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        .pvp-active {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 24px;
            padding: 16px;
            margin-top: 16px;
        }

        .pvp-battle {
            background: linear-gradient(135deg, #1a0a2e, #0a0a1a);
            border-radius: 28px;
            padding: 20px;
            text-align: center;
            border: 2px solid #ff0080;
        }

        .vs {
            font-size: 32px;
            font-weight: bold;
            margin: 16px 0;
            color: #ff0080;
            text-shadow: 0 0 10px #ff0080;
        }

        .battle-result {
            margin-top: 20px;
            font-size: 24px;
            font-weight: bold;
        }

        /* Инвентарь */
        .inventory {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 16px;
            margin-top: 20px;
        }

        .inventory h3 {
            margin-bottom: 12px;
            font-size: 18px;
        }

        .inventory-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            max-height: 150px;
            overflow-y: auto;
        }

        .inv-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
        }

        button {
            font-family: inherit;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <div class="balance">
            <span>⭐️ Баланс</span>
            <span id="balanceValue">250</span>
        </div>
        <button class="add-stars" id="addStarsBtn">+ 100 Stars</button>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="cases">🎁 Кейсы</button>
        <button class="tab-btn" data-tab="pvp">⚔️ PvP Батлы</button>
    </div>

    <!-- Панель кейсов -->
    <div id="casesPanel" class="panel active">
        <div class="cases-grid" id="casesContainer"></div>
        <div class="inventory">
            <h3>📦 Мои подарки</h3>
            <div class="inventory-list" id="inventoryList">
                <div style="opacity: 0.5;">Здесь будут твои Telegram Gift</div>
            </div>
        </div>
    </div>

    <!-- Панель PvP -->
    <div id="pvpPanel" class="panel">
        <div class="pvp-create">
            <h3>🔥 Создать батл</h3>
            <select id="stakeGiftSelect">
                <option value="">Выбери подарок для ставки</option>
            </select>
            <button id="createBattleBtn">⚔️ Создать батл</button>
        </div>
        <div id="activeBattleArea"></div>
    </div>
</div>

<script>
    // ------------------- ТВОЙ ТОКЕН БОТА -------------------
    const BOT_TOKEN = "8209263425:AAFZQzJCzLmnV044UPaCWJWJZ3ZQw24H85k";

    // ------------------- ДАННЫЕ ПОДАРКОВ -------------------
    const GIFTS_DB = {
        "Розовый мишка": { icon: "🧸", starsValue: 15, rarity: "common" },
        "Букет цветов": { icon: "💐", starsValue: 15, rarity: "common" },
        "Шоколадка": { icon: "🍫", starsValue: 15, rarity: "common" },
        "Золотая звезда": { icon: "⭐️", starsValue: 50, rarity: "rare" },
        "Алмазное сердце": { icon: "💎", starsValue: 50, rarity: "rare" },
        "Легендарный дракон": { icon: "🐉", starsValue: 200, rarity: "epic" },
        "Космический корабль": { icon: "🚀", starsValue: 200, rarity: "epic" },
        "Трон короля": { icon: "👑", starsValue: 1000, rarity: "legendary" }
    };

    // Конфигурация кейсов
    const CASES = [
        {
            id: "common",
            name: "🎁 Обычный кейс",
            price: 30,
            description: "Гарантированный обычный подарок",
            gifts: [
                { name: "Розовый мишка", chance: 40 },
                { name: "Букет цветов", chance: 35 },
                { name: "Шоколадка", chance: 25 }
            ]
        },
        {
            id: "rare",
            name: "✨ Редкий кейс",
            price: 80,
            description: "Шанс на алмазное сердце!",
            gifts: [
                { name: "Розовый мишка", chance: 30 },
                { name: "Букет цветов", chance: 20 },
                { name: "Шоколадка", chance: 20 },
                { name: "Золотая звезда", chance: 20 },
                { name: "Алмазное сердце", chance: 10 }
            ]
        },
        {
            id: "epic",
            name: "🔥 Эпический кейс",
            price: 200,
            description: "Можно выбить дракона!",
            gifts: [
                { name: "Золотая звезда", chance: 35 },
                { name: "Алмазное сердце", chance: 35 },
                { name: "Легендарный дракон", chance: 20 },
                { name: "Космический корабль", chance: 10 }
            ]
        },
        {
            id: "legendary",
            name: "👑 Легендарный кейс",
            price: 500,
            description: "Главный приз — Трон короля!",
            gifts: [
                { name: "Легендарный дракон", chance: 40 },
                { name: "Космический корабль", chance: 35 },
                { name: "Трон короля", chance: 25 }
            ]
        }
    ];

    // Состояние игрока
    let userBalance = 250;
    let inventory = [];
    let currentBattle = null;

    // DOM элементы
    const balanceSpan = document.getElementById("balanceValue");
    const casesContainer = document.getElementById("casesContainer");
    const inventoryListDiv = document.getElementById("inventoryList");
    const stakeSelect = document.getElementById("stakeGiftSelect");
    const activeBattleArea = document.getElementById("activeBattleArea");

    // Сохранение/загрузка
    function saveToLocalStorage() {
        localStorage.setItem("giftcase_balance", userBalance);
        localStorage.setItem("giftcase_inventory", JSON.stringify(inventory));
    }

    function loadFromLocalStorage() {
        const savedBalance = localStorage.getItem("giftcase_balance");
        if (savedBalance !== null) userBalance = parseInt(savedBalance);
        const savedInv = localStorage.getItem("giftcase_inventory");
        if (savedInv !== null) {
            try {
                inventory = JSON.parse(savedInv);
            } catch(e) { inventory = []; }
        }
        updateBalanceUI();
        renderInventory();
        updateStakeSelect();
    }

    function updateBalanceUI() {
        balanceSpan.innerText = userBalance;
        saveToLocalStorage();
    }

    function renderInventory() {
        if (inventory.length === 0) {
            inventoryListDiv.innerHTML = '<div style="opacity: 0.5;">Здесь будут твои Telegram Gift</div>';
            return;
        }
        let html = "";
        inventory.forEach((gift) => {
            html += `<div class="inv-item">${gift.icon} ${gift.name} (⭐️ ${gift.starsValue})</div>`;
        });
        inventoryListDiv.innerHTML = html;
        updateStakeSelect();
    }

    function updateStakeSelect() {
        if (!stakeSelect) return;
        stakeSelect.innerHTML = '<option value="">Выбери подарок для ставки</option>';
        inventory.forEach((gift, idx) => {
            const option = document.createElement("option");
            option.value = idx;
            option.textContent = `${gift.icon} ${gift.name} (⭐️ ${gift.starsValue})`;
            stakeSelect.appendChild(option);
        });
    }

    function openCase(caseData) {
        const totalChance = caseData.gifts.reduce((sum, g) => sum + g.chance, 0);
        let random = Math.random() * totalChance;
        let accumulated = 0;
        for (let gift of caseData.gifts) {
            accumulated += gift.chance;
            if (random <= accumulated) {
                return gift.name;
            }
        }
        return caseData.gifts[0].name;
    }

    function addGiftToInventory(giftName) {
        const giftInfo = GIFTS_DB[giftName];
        if (!giftInfo) return;
        inventory.push({
            name: giftName,
            icon: giftInfo.icon,
            starsValue: giftInfo.starsValue,
            rarity: giftInfo.rarity
        });
        renderInventory();
        saveToLocalStorage();
    }

    function createConfetti() {
        for (let i = 0; i < 100; i++) {
            const conf = document.createElement('div');
            conf.className = 'confetti';
            conf.style.left = Math.random() * 100 + '%';
            conf.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 50%)`;
            conf.style.width = Math.random() * 8 + 4 + 'px';
            conf.style.height = conf.style.width;
            conf.style.position = 'fixed';
            conf.style.top = '-10px';
            conf.style.zIndex = '1001';
            document.body.appendChild(conf);
            setTimeout(() => conf.remove(), 1000);
        }
    }

    function showOpeningAnimation(wonGiftName, callback) {
        const overlay = document.createElement('div');
        overlay.className = 'opening-animation';
        overlay.innerHTML = `
            <div class="case-opening">
                <div class="gift-box">🎁</div>
                <h2 style="margin-top: 20px;">Открываем...</h2>
            </div>
        `;
        document.body.appendChild(overlay);

        const giftBox = overlay.querySelector('.gift-box');
        let rotate = 0;
        const interval = setInterval(() => {
            rotate += 30;
            giftBox.style.transform = `rotate(${rotate}deg) scale(1.2)`;
        }, 50);

        setTimeout(() => {
            clearInterval(interval);
            const giftInfo = GIFTS_DB[wonGiftName];
            overlay.innerHTML = `
                <div class="case-opening">
                    <div style="font-size: 100px;">${giftInfo?.icon || '🎁'}</div>
                    <h2 style="margin-top: 20px; color: #FFD700;">${wonGiftName}!</h2>
                    <p style="margin-top: 10px;">⭐️ Стоимость: ${giftInfo?.starsValue || 0} Stars</p>
                </div>
            `;
            createConfetti();

            setTimeout(() => {
                overlay.remove();
                if (callback) callback();
            }, 2000);
        }, 1500);
    }

    function sendGiftToTelegram(giftName) {
        if (window.Telegram && window.Telegram.WebApp) {
            const tg = window.Telegram.WebApp;
            const userId = tg.initDataUnsafe?.user?.id;
            if (userId) {
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: userId,
                        text: `🎁 Поздравляю! Ты выиграл подарок: ${giftName}!\n\nОн автоматически добавлен в твой инвентарь. Используй его в PvP-батлах!`
                    })
                }).catch(console.error);
                tg.showAlert(`🎉 Ты выиграл ${giftName}! Подарок в инвентаре.`);
            } else {
                tg.showAlert(`🎉 Ты выиграл ${giftName}! (Демо-режим)`);
            }
        } else {
            alert(`🎉 Ты выиграл ${giftName}! Подарок добавлен в инвентарь.`);
        }
    }

    function attemptOpenCase(caseData) {
        if (userBalance < caseData.price) {
            if (window.Telegram?.WebApp) {
                window.Telegram.WebApp.showAlert("❌ Недостаточно Stars! Пополни баланс.");
            } else {
                alert("Недостаточно Stars!");
            }
            return;
        }

        userBalance -= caseData.price;
        updateBalanceUI();

        const wonGiftName = openCase(caseData);
        addGiftToInventory(wonGiftName);

        showOpeningAnimation(wonGiftName, () => {
            sendGiftToTelegram(wonGiftName);
        });
    }

    function renderCases() {
        casesContainer.innerHTML = "";
        for (let caseItem of CASES) {
            const card = document.createElement("div");
            card.className = "case-card";
            let chancesText = "";
            for (let g of caseItem.gifts) {
                chancesText += `${g.name} (${g.chance}%) `;
            }
            card.innerHTML = `
                <div class="case-header">
                    <div class="case-name">${caseItem.name}</div>
                    <div class="case-price">⭐️ ${caseItem.price}</div>
                </div>
                <div class="case-chance">🎲 ${caseItem.description}<br>📊 ${chancesText}</div>
                <div class="gift-preview">
                    ${caseItem.gifts.slice(0,3).map(g => `<span class="gift-tag">${GIFTS_DB[g.name]?.icon || "🎁"} ${g.name}</span>`).join('')}
                    ${caseItem.gifts.length > 3 ? '<span class="gift-tag">+ещё</span>' : ''}
                </div>
                <button class="open-btn">🔓 Открыть кейс</button>
            `;
            const openBtn = card.querySelector(".open-btn");
            openBtn.addEventListener("click", (e) => {
                e.stopPropagation();
                attemptOpenCase(caseItem);
            });
            casesContainer.appendChild(card);
        }
    }

    // ==================== PvP МЕХАНИКА ====================
    function createBattle(giftIndex) {
        if (!inventory[giftIndex]) {
            alert("Выбери подарок!");
            return;
        }
        const stakedGift = inventory[giftIndex];
        inventory.splice(giftIndex, 1);
        renderInventory();
        saveToLocalStorage();

        currentBattle = {
            id: Date.now(),
            playerGift: stakedGift,
            createdAt: Date.now(),
            opponent: null
        };

        const battleLink = `${window.location.origin}${window.location.pathname}?battle=${currentBattle.id}`;
        
        activeBattleArea.innerHTML = `
            <div class="pvp-battle">
                <h3>⚔️ Ожидание соперника</h3>
                <div>Твоя ставка: ${stakedGift.icon} ${stakedGift.name}</div>
                <div class="vs">VS</div>
                <div>Противник ещё не присоединился</div>
                <button id="copyBattleLinkBtn" style="margin-top: 16px; background: #2ea043; border: none; padding: 10px; border-radius: 40px;">🔗 Скопировать ссылку для приглашения</button>
                <button id="cancelBattleBtn" style="margin-top: 10px; background: #555; border: none; padding: 10px; border-radius: 40px;">❌ Отменить</button>
            </div>
        `;

        document.getElementById("copyBattleLinkBtn")?.addEventListener("click", () => {
            navigator.clipboard.writeText(battleLink);
            alert("Ссылка скопирована! Отправь её другу.");
        });
        document.getElementById("cancelBattleBtn")?.addEventListener("click", () => {
            inventory.push(stakedGift);
            renderInventory();
            currentBattle = null;
            activeBattleArea.innerHTML = "<div style='text-align: center; opacity: 0.6;'>Нет активных батлов. Создай новый!</div>";
        });
    }

    function simulateBattle(playerGift, opponentGift) {
        const playerPower = playerGift.starsValue;
        const opponentPower = opponentGift.starsValue;
        const playerRoll = Math.random() * playerPower;
        const opponentRoll = Math.random() * opponentPower;
        
        if (playerRoll > opponentRoll) {
            return { winner: "player", reward: [playerGift, opponentGift] };
        } else if (opponentRoll > playerRoll) {
            return { winner: "opponent", reward: [opponentGift, playerGift] };
        } else {
            return { winner: "draw", reward: [playerGift, opponentGift] };
        }
    }

    function joinBattle(battleId, myGiftIndex) {
        if (!currentBattle || currentBattle.id != battleId) {
            alert("Батл не найден или уже завершён");
            return false;
        }
        if (currentBattle.opponent) {
            alert("Уже есть соперник!");
            return false;
        }
        const myGift = inventory[myGiftIndex];
        if (!myGift) {
            alert("Выбери подарок!");
            return false;
        }

        inventory.splice(myGiftIndex, 1);
        renderInventory();
        currentBattle.opponent = { gift: myGift };

        const result = simulateBattle(currentBattle.playerGift, myGift);
        
        let resultText = "";
        if (result.winner === "player") {
            resultText = `🏆 Ты проиграл... ${currentBattle.playerGift.icon} ${currentBattle.playerGift.name} уходит победителю`;
            // Победитель (создатель батла) получит призы при обновлении
        } else if (result.winner === "opponent") {
            resultText = `🎉 ПОБЕДА! Ты забираешь оба подарка: ${result.reward[0].icon} ${result.reward[0].name} и ${result.reward[1].icon} ${result.reward[1].name}`;
            inventory.push(...result.reward);
            renderInventory();
        } else {
            resultText = `🤝 Ничья! Возвращаем подарки.`;
            inventory.push(currentBattle.playerGift, myGift);
            renderInventory();
        }
        
        activeBattleArea.innerHTML = `
            <div class="pvp-battle">
                <h3>⚔️ Результат батла</h3>
                <div>Твоя ставка: ${myGift.icon} ${myGift.name}</div>
                <div>Ставка соперника: ${currentBattle.playerGift.icon} ${currentBattle.playerGift.name}</div>
                <div class="battle-result">${resultText}</div>
                <button id="closeBattleBtn" style="margin-top: 16px; background: #2a6df4; border: none; padding: 10px; border-radius: 40px;">✅ Закрыть</button>
            </div>
        `;
        
        document.getElementById("closeBattleBtn")?.addEventListener("click", () => {
            currentBattle = null;
            activeBattleArea.innerHTML = "<div style='text-align: center; opacity: 0.6;'>Нет активных батлов. Создай новый!</div>";
        });
        
        return true;
    }

    document.getElementById("createBattleBtn")?.addEventListener("click", () => {
        const selectedIdx = stakeSelect.value;
        if (selectedIdx === "") {
            alert("Выбери подарок для ставки!");
            return;
        }
        createBattle(parseInt(selectedIdx));
    });

    // Вкладки
    document.querySelectorAll(".tab-btn").forEach(btn => {
        btn.addEventListener("click", () => {
            document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
            document.getElementById(`${btn.dataset.tab}Panel`).classList.add("active");
        });
    });

    function checkBattleInvite() {
        const urlParams = new URLSearchParams(window.location.search);
        const battleId = urlParams.get("battle");
        if (battleId && currentBattle && currentBattle.id == battleId && !currentBattle.opponent) {
            setTimeout(() => {
                if (inventory.length > 0) {
                    const options = inventory.map((g, i) => `${i}: ${g.icon} ${g.name}`).join("\n");
                    const joinGift = prompt(`Соперник ждёт! Поставь на кон один из своих подарков:\n${options}\n\nВведи номер подарка:`);
                    if (joinGift !== null && !isNaN(parseInt(joinGift)) && inventory[parseInt(joinGift)]) {
                        joinBattle(battleId, parseInt(joinGift));
                    }
                } else {
                    alert("У тебя нет подарков для ставки! Открой кейс.");
                }
            }, 500);
        }
    }

    // Пополнение баланса
    document.getElementById("addStarsBtn").addEventListener("click", () => {
        userBalance += 100;
        updateBalanceUI();
        if (window.Telegram?.WebApp) {
            window.Telegram.WebApp.showAlert("+100 Stars добавлено!");
        }
    });

    // Инициализация Telegram WebApp
    if (window.Telegram && window.Telegram.WebApp) {
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        tg.enableClosingConfirmation();
    }

    loadFromLocalStorage();
    renderCases();
    checkBattleInvite();
</script>
</body>
</html>
