<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Test - GiftCase</title>
<style>
body { background: #060606; color: white; font-family: monospace; padding: 20px; }
button { background: #c8a96e; color: black; padding: 10px 20px; margin: 10px; cursor: pointer; }
.panel { display: none; padding: 20px; background: #161616; margin: 10px 0; }
.panel.active { display: block; }
</style>
</head>
<body>

<h1>GIFTCASE - ТЕСТ</h1>

<div>
  <button class="tab" data-tab="cases">Кейсы</button>
  <button class="tab" data-tab="upgrade">Апгрейд</button>
  <button class="tab" data-tab="craft">Крафт</button>
  <button class="tab" data-tab="pvp">PvP</button>
  <button class="tab" data-tab="profile">Профиль</button>
</div>

<div id="casesPanel" class="panel active">
  <h2>КЕЙСЫ</h2>
  <div id="casesGrid"></div>
  <p>✅ Кейсы должны отображаться здесь</p>
</div>

<div id="upgradePanel" class="panel">
  <h2>АПГРЕЙД</h2>
  <p>✅ Работает</p>
</div>

<div id="craftPanel" class="panel">
  <h2>КРАФТ</h2>
  <p>✅ Работает</p>
</div>

<div id="pvpPanel" class="panel">
  <h2>PvP</h2>
  <p>✅ Работает</p>
</div>

<div id="profilePanel" class="panel">
  <h2>ПРОФИЛЬ</h2>
  <p>✅ Работает</p>
</div>

<script>
// Простые кейсы для теста
const CASES = [
  {id:1, name:"КЕЙС 1", emoji:"🎁", price:10},
  {id:2, name:"КЕЙС 2", emoji:"📦", price:20},
  {id:3, name:"КЕЙС 3", emoji:"🎀", price:30}
];

// Функция отображения кейсов
function renderCases() {
  const grid = document.getElementById('casesGrid');
  if(!grid) return;
  grid.innerHTML = CASES.map(c => 
    `<div style="border:1px solid #c8a96e; padding:10px; margin:5px; display:inline-block">
      <div style="font-size:40px">${c.emoji}</div>
      <div>${c.name}</div>
      <div>★ ${c.price}</div>
      <button onclick="alert('Открыт ${c.name}')">ОТКРЫТЬ</button>
    </div>`
  ).join('');
}

// Навигация
document.querySelectorAll('.tab').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    const tab = btn.dataset.tab;
    document.getElementById(tab + 'Panel').classList.add('active');
    console.log('Переход на:', tab);
  };
});

// Запуск
renderCases();
console.log('✅ Тест запущен, навигация работает');
</script>

</body>
</html>
